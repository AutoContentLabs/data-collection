version: '3.8'
services:
  # MongoDB
  mongodb:
    image: mongo
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./databases/mongodb:/data/db
      - ./databases/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js  # Başlangıç betiği
    networks:
      - backend

  # PostgreSQL
  postgresql:
    image: postgres
    container_name: postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./databases/postgresql:/var/lib/postgresql/data
      - ./databases/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql  # Başlangıç betiği
    networks:
      - backend

 # InfluxDB
  influxdb:
    image: influxdb
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
    volumes:
      - ./databases/influxdb:/var/lib/influxdb
    networks:
      - backend


  # Cassandra
  cassandra:
    image: cassandra
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      CASSANDRA_NUM_TOKENS: 16
      CASSANDRA_RPC_ADDRESS: 0.0.0.0
    volumes:
      - ./databases/cassandra:/var/lib/cassandra
      - ./databases/cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql  # Başlangıç betiği
    networks:
      - backend

      
  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - backend

 
  # ClickHouse
  clickhouse:
    image: yandex/clickhouse-server
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./databases/clickhouse:/var/lib/clickhouse
      - ./databases/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql  # Başlangıç betiği
    networks:
      - backend




networks:
  backend:
    driver: bridge
